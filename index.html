<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xget - 全平台开发者资源加速引擎</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        /* ========== 全局变量与主题 ========== */
        :root {
            --primary: #0071e3;
            --primary-hover: #0077ed;
            --success: #34c759;
            --warning: #ff9500;
            --danger: #ff3b30;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --border: #d2d2d7;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-hover: 0 4px 20px rgba(0,0,0,0.12);
        }

        [data-theme="dark"] {
            --primary: #2997ff;
            --primary-hover: #40a9ff;
            --bg: #000000;
            --card-bg: #1c1c1e;
            --text: #f5f5f7;
            --text-secondary: #86868b;
            --border: #38383a;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --shadow-hover: 0 4px 20px rgba(0,0,0,0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
            transition: all 0.3s;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ========== 头部 ========== */
        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #5ac8fa, #34c759);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* ========== 工具栏 ========== */
        .toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .tool-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            color: var(--text);
        }

        .tool-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ========== 卡片 ========== */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
            transition: box-shadow 0.3s;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
        }

        /* ========== 平台选择器 ========== */
        .platform-section {
            margin-bottom: 1.5rem;
        }

        .platform-label {
            font-weight: 600;
            margin-bottom: 0.8rem;
            display: block;
            font-size: 0.95rem;
        }

        .platform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .platform-btn {
            padding: 0.7rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            color: var(--text);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .platform-btn:hover {
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .platform-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .platform-icon {
            font-size: 1.1rem;
        }

        /* ========== 输入区域 ========== */
        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .input-label span {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .format-toggle {
            font-size: 0.85rem;
            color: var(--primary);
            cursor: pointer;
            user-select: none;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
        }

        /* ========== 按钮组 ========== */
        .btn-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ========== 结果区域 ========== */
        .result-group {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            display: none;
        }

        .result-group.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-input {
            background: var(--bg);
            margin-bottom: 1rem;
        }

        /* ========== 快捷操作面板 ========== */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.6rem;
            margin-top: 1rem;
        }

        .action-btn {
            padding: 0.7rem 0.9rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            color: var(--text);
            text-align: center;
        }

        .action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
        }

        .action-btn.success {
            border-color: var(--success);
            color: var(--success);
        }

        /* ========== 历史记录 ========== */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .history-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .history-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .search-input {
            padding: 0.5rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            background: var(--bg);
            color: var(--text);
            width: 180px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .history-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .history-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: var(--bg);
        }

        .history-checkbox {
            margin-top: 0.2rem;
        }

        .history-content {
            flex: 1;
            min-width: 0;
        }

        .history-url {
            font-size: 0.95rem;
            word-break: break-all;
            margin-bottom: 0.4rem;
            color: var(--text);
        }

        .history-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .history-actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .mini-btn {
            padding: 0.3rem 0.7rem;
            font-size: 0.8rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: auto;
        }

        .mini-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .empty-history {
            text-align: center;
            padding: 2.5rem;
            color: var(--text-secondary);
        }

        /* ========== 使用说明 ========== */
        .tips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .tip-card {
            padding: 1rem;
            background: linear-gradient(135deg, rgba(0,113,227,0.05), rgba(90,200,250,0.05));
            border-radius: 10px;
            border: 1px solid rgba(0,113,227,0.1);
        }

        .tip-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary);
            font-size: 0.95rem;
        }

        .tip-content {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            body {
                padding: 1rem 0.5rem;
            }

            .logo {
                font-size: 2.2rem;
            }

            .card {
                padding: 1.5rem;
                border-radius: 12px;
            }

            .platform-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .search-input {
                width: 140px;
            }

            .history-item {
                flex-direction: column;
            }

            .history-actions {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="logo">Xget</div>
            <p class="subtitle">全平台开发者资源加速引擎</p>
        </header>

        <!-- 工具栏 -->
        <div class="toolbar">
            <button class="tool-btn" id="themeToggle" title="切换主题">🌙</button>
            <button class="tool-btn" id="exportHistory" title="导出历史">📤 导出</button>
        </div>

        <!-- 主功能卡片 -->
        <div class="card">
            <!-- 平台选择 -->
            <div class="platform-section">
                <label class="platform-label">选择平台</label>
                <div class="platform-grid" id="platformGrid">
                    <!-- 平台按钮将通过JS动态生成 -->
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-group">
                <div class="input-label">
                    <span id="inputLabel">输入资源路径</span>
                    <span class="format-toggle" id="formatToggle">切换格式</span>
                </div>
                <input type="text" id="resourceInput" placeholder="选择平台后输入...">
            </div>

            <!-- 按钮组 -->
            <div class="btn-group">
                <button class="btn-primary" id="generateBtn">🚀 生成加速链接</button>
                <button class="btn-secondary" id="clearBtn">清空</button>
            </div>

            <!-- 结果区域 -->
            <div class="result-group" id="resultGroup">
                <div class="input-group">
                    <label>加速链接</label>
                    <input type="text" id="acceleratedUrl" class="result-input" readonly>
                </div>
                <div class="quick-actions" id="quickActions">
                    <!-- 快捷操作按钮将通过JS动态生成 -->
                </div>
            </div>
        </div>

        <!-- 历史记录卡片 -->
        <div class="card">
            <div class="history-header">
                <span class="history-title">📋 生成历史</span>
                <div class="history-controls">
                    <input type="text" class="search-input" id="searchHistory" placeholder="搜索历史...">
                    <button class="tool-btn" id="selectAllBtn">全选</button>
                    <button class="tool-btn" id="batchCopyBtn">批量复制</button>
                    <button class="tool-btn" id="clearHistoryBtn" style="color: var(--danger); border-color: var(--danger);">清空</button>
                </div>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-history">暂无生成记录</div>
            </div>
        </div>

        <!-- 使用说明卡片 -->
        <div class="card">
            <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem;">💡 快速上⼿</div>
            <div class="tips-grid">
                <div class="tip-card">
                    <div class="tip-title">GitHub/GitLab</div>
                    <div class="tip-content">选择平台后输入仓库路径，如：<code>xixu-me/Xget</code>，自动生成短前缀链接</div>
                </div>
                <div class="tip-card">
                    <div class="tip-title">Docker 镜像</div>
                    <div class="tip-content">选择 Docker 平台，输入镜像名，如：<code>library/nginx</code>，复制 pull 命令直接使用</div>
                </div>
                <div class="tip-card">
                    <div class="tip-title">PyPI/npm</div>
                    <div class="tip-content">选择包管理器平台，复制配置命令，一键设置镜像源</div>
                </div>
                <div class="tip-card">
                    <div class="tip-title">AI API</div>
                    <div class="tip-content">选择 AI 平台，复制 base_url，在代码中替换即可加速 API 调用</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const BASE_DOMAIN = 'https://xget.678870.xyz';
        const HISTORY_KEY = 'xget_history_v2';
        const MAX_HISTORY = 50;
        const THEME_KEY = 'xget_theme';

        // ========== 平台定义（完整覆盖） ==========
        const PLATFORMS = [
            // 代码托管
            { id: 'gh', name: 'GitHub', icon: '🐙', prefix: 'gh', base: 'https://github.com', placeholder: 'xixu-me/Xget', type: 'code' },
            { id: 'gl', name: 'GitLab', icon: '🔬', prefix: 'gl', base: 'https://gitlab.com', placeholder: 'gitlab-com/gitlab-com-infrastructure', type: 'code' },
            { id: 'gist', name: 'Gist', icon: '📝', prefix: 'gist', base: 'https://gist.github.com', placeholder: 'xixu-me/xxx', type: 'code' },
            { id: 'gitea', name: 'Gitea', icon: '🍵', prefix: 'gitea', base: 'https://gitea.com', placeholder: 'gitea/gitea', type: 'code' },
            { id: 'codeberg', name: 'Codeberg', icon: '⛰️', prefix: 'codeberg', base: 'https://codeberg.org', placeholder: 'forgejo/forgejo', type: 'code' },
            { id: 'sf', name: 'SourceForge', icon: '🔧', prefix: 'sf', base: 'https://sourceforge.net', placeholder: 'projects/sevenzip', type: 'code' },
            { id: 'aosp', name: 'AOSP', icon: '🤖', prefix: 'aosp', base: 'https://android.googlesource.com', placeholder: 'platform/frameworks/base', type: 'code' },
            
            // AI/模型
            { id: 'hf', name: 'Hugging Face', icon: '🤗', prefix: 'hf', base: 'https://huggingface.co', placeholder: 'bert-base-uncased', type: 'ai' },
            { id: 'civitai', name: 'Civitai', icon: '🎨', prefix: 'civitai', base: 'https://civitai.com', placeholder: 'api/download/models/128713', type: 'ai' },
            
            // 容器镜像
            { id: 'cr-docker', name: 'Docker Hub', icon: '🐳', prefix: 'cr/docker', base: 'https://registry-1.docker.io', placeholder: 'library/nginx', type: 'docker' },
            { id: 'cr-ghcr', name: 'GHCR', icon: '📦', prefix: 'cr/ghcr', base: 'https://ghcr.io', placeholder: 'owner/image', type: 'docker' },
            { id: 'cr-gcr', name: 'GCR', icon: '☁️', prefix: 'cr/gcr', base: 'https://gcr.io', placeholder: 'distroless/base', type: 'docker' },
            { id: 'cr-mcr', name: 'MCR', icon: '🪟', prefix: 'cr/mcr', base: 'https://mcr.microsoft.com', placeholder: 'dotnet/runtime', type: 'docker' },
            { id: 'cr-quay', name: 'Quay', icon: '⚓', prefix: 'cr/quay', base: 'https://quay.io', placeholder: 'coreos/etcd', type: 'docker' },
            { id: 'cr-k8s', name: 'K8s', icon: '☸️', prefix: 'cr/k8s', base: 'https://registry.k8s.io', placeholder: 'pause', type: 'docker' },
            
            // 包管理器
            { id: 'npm', name: 'npm', icon: '📦', prefix: 'npm', base: 'https://registry.npmjs.org', placeholder: 'react', type: 'package' },
            { id: 'pypi', name: 'PyPI', icon: '🐍', prefix: 'pypi', base: 'https://pypi.org', placeholder: 'packages/source/r/requests', type: 'package' },
            { id: 'conda', name: 'conda', icon: '🐍', prefix: 'conda', base: 'https://repo.anaconda.com', placeholder: 'pkgs/main/linux-64', type: 'package' },
            { id: 'maven', name: 'Maven', icon: '☕', prefix: 'maven', base: 'https://repo1.maven.org', placeholder: 'maven2/org/springframework', type: 'package' },
            { id: 'gradle', name: 'Gradle', icon: '🐘', prefix: 'gradle', base: 'https://plugins.gradle.org', placeholder: 'm2/org/gradle', type: 'package' },
            { id: 'golang', name: 'Go Modules', icon: '🐹', prefix: 'golang', base: 'https://proxy.golang.org', placeholder: 'github.com/gin-gonic/gin', type: 'package' },
            { id: 'crates', name: 'Crates.io', icon: '🦀', prefix: 'crates', base: 'https://crates.io', placeholder: 'api/v1/crates/serde', type: 'package' },
            { id: 'rubygems', name: 'RubyGems', icon: '💎', prefix: 'rubygems', base: 'https://rubygems.org', placeholder: 'gems/rails', type: 'package' },
            
            // AI API
            { id: 'ip-openai', name: 'OpenAI', icon: '🧠', prefix: 'ip/openai', base: 'https://api.openai.com', placeholder: 'v1/chat/completions', type: 'ai-api' },
            { id: 'ip-anthropic', name: 'Anthropic', icon: '🔮', prefix: 'ip/anthropic', base: 'https://api.anthropic.com', placeholder: 'v1/messages', type: 'ai-api' },
            { id: 'ip-gemini', name: 'Gemini', icon: '✨', prefix: 'ip/gemini', base: 'https://generativelanguage.googleapis.com', placeholder: 'v1beta/models', type: 'ai-api' },
            { id: 'ip-cohere', name: 'Cohere', icon: '🔗', prefix: 'ip/cohere', base: 'https://api.cohere.ai', placeholder: 'v1/chat', type: 'ai-api' },
            { id: 'ip-mistral', name: 'Mistral', icon: '🌪️', prefix: 'ip/mistralai', base: 'https://api.mistral.ai', placeholder: 'v1/chat/completions', type: 'ai-api' },
            
            // 其他
            { id: 'apache', name: 'Apache', icon: '🦅', prefix: 'apache', base: 'https://downloads.apache.org', placeholder: 'kafka/3.6.1', type: 'other' },
            { id: 'homebrew', name: 'Homebrew', icon: '🍺', prefix: 'homebrew', base: 'https://github.com/Homebrew', placeholder: 'homebrew-core.git', type: 'other' },
            { id: 'arxiv', name: 'arXiv', icon: '📄', prefix: 'arxiv', base: 'https://arxiv.org', placeholder: 'pdf/2301.07041.pdf', type: 'other' },
            { id: 'jenkins', name: 'Jenkins', icon: '🔴', prefix: 'jenkins', base: 'https://updates.jenkins.io', placeholder: 'download/plugins/git', type: 'other' },
            { id: 'custom', name: '自定义URL', icon: '🔗', prefix: '', base: '', placeholder: 'https://example.com/resource', type: 'custom' }
        ];

        // ========== 状态 ==========
        let currentPlatform = PLATFORMS[0];
        let useShortFormat = true;
        let currentAcceleratedUrl = '';
        let selectedHistoryItems = new Set();

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            renderPlatforms();
            bindEvents();
            renderHistory();
        });

        // ========== 主题 ==========
        function initTheme() {
            const saved = localStorage.getItem(THEME_KEY) || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeIcon(saved);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem(THEME_KEY, next);
            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        // ========== 渲染平台按钮 ==========
        function renderPlatforms() {
            const grid = document.getElementById('platformGrid');
            grid.innerHTML = PLATFORMS.map(p => `
                <button class="platform-btn ${p.id === currentPlatform.id ? 'active' : ''}" 
                        data-id="${p.id}" title="${p.name}">
                    <span class="platform-icon">${p.icon}</span>
                    <span>${p.name}</span>
                </button>
            `).join('');

            // 绑定点击事件
            grid.querySelectorAll('.platform-btn').forEach(btn => {
                btn.addEventListener('click', () => selectPlatform(btn.dataset.id));
            });
        }

        // ========== 选择平台 ==========
        function selectPlatform(platformId) {
            currentPlatform = PLATFORMS.find(p => p.id === platformId);
            
            // 更新UI
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.id === platformId);
            });

            // 更新输入框
            const input = document.getElementById('resourceInput');
            const label = document.getElementById('inputLabel');
            
            label.innerHTML = `输入 <strong>${currentPlatform.name}</strong> 资源路径`;
            input.placeholder = `例如：${currentPlatform.placeholder}`;
            input.value = '';
            
            // 清空结果
            document.getElementById('resultGroup').classList.remove('show');
        }

        // ========== 生成加速链接 ==========
        function generateUrl() {
            const input = document.getElementById('resourceInput').value.trim();
            if (!input) {
                alert('请输入资源路径');
                return;
            }

            let acceleratedUrl = '';
            
            if (currentPlatform.type === 'custom') {
                // 自定义URL
                let url = input;
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }
                acceleratedUrl = `${BASE_DOMAIN}/${url}`;
            } else if (useShortFormat && currentPlatform.prefix) {
                // 短前缀格式
                let path = input;
                // 如果输入了完整URL，提取路径
                if (path.startsWith('http://') || path.startsWith('https://')) {
                    try {
                        const u = new URL(path);
                        path = u.pathname;
                        if (path.startsWith('/')) path = path.substring(1);
                    } catch(e) {}
                }
                if (path.startsWith('/')) path = path.substring(1);
                acceleratedUrl = `${BASE_DOMAIN}/${currentPlatform.prefix}/${path}`;
            } else {
                // 完整URL格式
                let url = input;
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = `${currentPlatform.base}/${url}`;
                }
                acceleratedUrl = `${BASE_DOMAIN}/${url}`;
            }

            currentAcceleratedUrl = acceleratedUrl;
            
            // 显示结果
            document.getElementById('acceleratedUrl').value = acceleratedUrl;
            document.getElementById('resultGroup').classList.add('show');
            
            // 生成快捷操作
            renderQuickActions();
            
            // 保存历史
            saveHistory(input, acceleratedUrl);
        }

        // ========== 渲染快捷操作 ==========
        function renderQuickActions() {
            const container = document.getElementById('quickActions');
            let actions = [];

            // 基础操作
            actions.push({ text: '📋 复制链接', action: copyUrl });
            actions.push({ text: '🔗 一键打开', action: openUrl });

            // 根据平台类型添加特定操作
            if (currentPlatform.type === 'code') {
                actions.push({ text: '📦 复制 Git Clone', action: copyGitClone });
            }
            if (currentPlatform.type === 'docker') {
                actions.push({ text: '🐳 复制 Pull 命令', action: copyDockerPull });
            }
            if (currentPlatform.type === 'package') {
                if (currentPlatform.id === 'pypi') {
                    actions.push({ text: '🐍 复制 pip 配置', action: copyPipConfig });
                }
                if (currentPlatform.id === 'npm') {
                    actions.push({ text: '📦 复制 npm 配置', action: copyNpmConfig });
                }
            }
            if (currentPlatform.type === 'ai-api') {
                actions.push({ text: '🧠 复制 Base URL', action: copyBaseUrl });
            }

            container.innerHTML = actions.map((a, i) => `
                <button class="action-btn" data-index="${i}">${a.text}</button>
            `).join('');

            // 绑定事件
            container.querySelectorAll('.action-btn').forEach((btn, i) => {
                btn.addEventListener('click', () => {
                    actions[i].action();
                    btn.classList.add('success');
                    setTimeout(() => btn.classList.remove('success'), 1000);
                });
            });
        }

        // ========== 快捷操作函数 ==========
        function copyUrl() {
            copyToClipboard(currentAcceleratedUrl);
        }

        function openUrl() {
            window.open(currentAcceleratedUrl, '_blank');
        }

        function copyGitClone() {
            copyToClipboard(`git clone ${currentAcceleratedUrl}`);
        }

        function copyDockerPull() {
            // 提取镜像名
            let imageName = currentPlatform.placeholder;
            const input = document.getElementById('resourceInput').value.trim();
            if (input) imageName = input;
            copyToClipboard(`docker pull ${BASE_DOMAIN.replace('https://', '')}/${currentPlatform.prefix}/${imageName}`);
        }

        function copyPipConfig() {
            copyToClipboard(`pip config set global.index-url ${BASE_DOMAIN}/pypi/simple/`);
        }

        function copyNpmConfig() {
            copyToClipboard(`npm config set registry ${BASE_DOMAIN}/npm/`);
        }

        function copyBaseUrl() {
            copyToClipboard(`${BASE_DOMAIN}/${currentPlatform.prefix}`);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => {
                // 降级方案
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('已复制到剪贴板');
            });
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
                background: var(--primary); color: white; padding: 0.8rem 1.5rem;
                border-radius: 8px; z-index: 9999; animation: fadeIn 0.3s;
            `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // ========== 历史记录 ==========
        function saveHistory(origin, accelerated) {
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            // 去重
            history = history.filter(h => h.accelerated !== accelerated);
            history.unshift({
                id: Date.now(),
                origin: origin,
                accelerated: accelerated,
                platform: currentPlatform.id,
                platformName: currentPlatform.name,
                platformIcon: currentPlatform.icon,
                time: new Date().toLocaleString()
            });
            history = history.slice(0, MAX_HISTORY);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistory();
        }

        function renderHistory(filter = '') {
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            
            // 搜索过滤
            if (filter) {
                history = history.filter(h => 
                    h.origin.toLowerCase().includes(filter.toLowerCase()) ||
                    h.accelerated.toLowerCase().includes(filter.toLowerCase()) ||
                    h.platformName.toLowerCase().includes(filter.toLowerCase())
                );
            }

            const list = document.getElementById('historyList');
            
            if (history.length === 0) {
                list.innerHTML = '<div class="empty-history">暂无生成记录</div>';
                return;
            }

            list.innerHTML = history.map(h => `
                <div class="history-item">
                    <input type="checkbox" class="history-checkbox" 
                           data-id="${h.id}" ${selectedHistoryItems.has(h.id) ? 'checked' : ''}>
                    <div class="history-content">
                        <div class="history-url">${h.accelerated}</div>
                        <div class="history-meta">
                            <span>${h.platformIcon} ${h.platformName}</span>
                            <span>原始: ${h.origin}</span>
                            <span>${h.time}</span>
                        </div>
                    </div>
                    <div class="history-actions">
                        <button class="mini-btn" onclick="copyHistoryItem('${h.accelerated}')">复制</button>
                        <button class="mini-btn" onclick="openHistoryItem('${h.accelerated}')">打开</button>
                        <button class="mini-btn" onclick="deleteHistoryItem(${h.id})" style="color: var(--danger); border-color: var(--danger);">删除</button>
                    </div>
                </div>
            `).join('');

            // 绑定复选框事件
            list.querySelectorAll('.history-checkbox').forEach(cb => {
                cb.addEventListener('change', () => {
                    if (cb.checked) {
                        selectedHistoryItems.add(Number(cb.dataset.id));
                    } else {
                        selectedHistoryItems.delete(Number(cb.dataset.id));
                    }
                });
            });
        }

        function copyHistoryItem(url) {
            copyToClipboard(url);
        }

        function openHistoryItem(url) {
            window.open(url, '_blank');
        }

        function deleteHistoryItem(id) {
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            history = history.filter(h => h.id !== id);
            selectedHistoryItems.delete(id);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistory(document.getElementById('searchHistory').value);
        }

        // ========== 批量操作 ==========
        function selectAllHistory() {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const checkboxes = document.querySelectorAll('.history-checkbox');
            
            const allSelected = checkboxes.length > 0 && checkboxes.length === selectedHistoryItems.size;
            
            if (allSelected) {
                selectedHistoryItems.clear();
            } else {
                history.forEach(h => selectedHistoryItems.add(h.id));
            }
            
            renderHistory(document.getElementById('searchHistory').value);
        }

        function batchCopy() {
            if (selectedHistoryItems.size === 0) {
                alert('请先选择要复制的记录');
                return;
            }
            
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const selected = history.filter(h => selectedHistoryItems.has(h.id));
            const text = selected.map(h => h.accelerated).join('\n');
            copyToClipboard(text);
        }

        function clearHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                localStorage.removeItem(HISTORY_KEY);
                selectedHistoryItems.clear();
                renderHistory();
            }
        }

        function exportHistory() {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            if (history.length === 0) {
                alert('暂无历史记录可导出');
                return;
            }
            
            const blob = new Blob([JSON.stringify(history, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `xget-history-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ========== 事件绑定 ==========
        function bindEvents() {
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('generateBtn').addEventListener('click', generateUrl);
            document.getElementById('clearBtn').addEventListener('click', () => {
                document.getElementById('resourceInput').value = '';
                document.getElementById('resultGroup').classList.remove('show');
            });
            document.getElementById('formatToggle').addEventListener('click', () => {
                useShortFormat = !useShortFormat;
                document.getElementById('formatToggle').textContent = useShortFormat ? '使用完整格式' : '使用短前缀';
            });
            document.getElementById('resourceInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') generateUrl();
            });
            document.getElementById('searchHistory').addEventListener('input', (e) => {
                renderHistory(e.target.value);
            });
            document.getElementById('selectAllBtn').addEventListener('click', selectAllHistory);
            document.getElementById('batchCopyBtn').addEventListener('click', batchCopy);
            document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);
            document.getElementById('exportHistory').addEventListener('click', exportHistory);
        }
    </script>
</body>
</html>
